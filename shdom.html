<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Tag Shadow Sandbox</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #161616;
            --accent: #bb86fc;
            --secondary: #03dac6;
            --text: #e0e0e0;
            --muted: #666;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .section {
            background: var(--card);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 650px;
            border: 1px solid #222;
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .grid { display: flex; flex-direction: column; gap: 20px; }

        h1 { font-weight: 200; color: var(--accent); margin-bottom: 40px; }
    </style>
</head>
<body>

    <h1>AUTOMATION LABYRINTH</h1>

    <div class="section">
        <div class="section-title">Section 1: Unique Div Targets</div>
        <div class="grid">
            <div id="s1-normal" style="padding:15px; background:#222; border-radius:8px; text-align:center; cursor:pointer;">Normal DOM</div>
            <div id="s1-h1"></div>
            <div id="s1-h2"></div>
            <div id="s1-h3"></div>
            <div id="s1-h4"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Section 2: Unique Form Containers</div>
        <div class="grid">
            <div id="s2-h1"></div>
            <div id="s2-h2"></div>
            <div id="s2-h3"></div>
            <div id="s2-h4"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Section 3: Unique Iframe Wrappers</div>
        <div class="grid">
            <div id="s3-h1"></div>
            <div id="s3-h2"></div>
            <div id="s3-h3"></div>
            <div id="s3-h4"></div>
        </div>
    </div>

    <script>
        // Tag names used for nesting to ensure uniqueness at every level
        const levelTags = ["main", "section", "article", "aside", "nav", "header"];

        const getStyles = (color) => `
            .container { display: flex; flex-direction: column; gap: 8px; font-family: sans-serif; }
            .row { display: flex; gap: 10px; }
            input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; flex-grow: 1; outline: none; }
            .target-btn { background: ${color}; color: #000; padding: 12px; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; min-width: 80px;}
            .label { color: var(--muted); font-size: 11px; margin-bottom: 5px; }
            .success-msg { color: #03dac6; font-size: 12px; opacity: 0; transition: 0.3s; margin-top: 5px; }
            iframe { border: 1px solid #333; width: 100%; height: 80px; border-radius: 8px; background: #0a0a0a; }
        `;

        function buildUniqueShadow(hostId, layers, type, color, labelText) {
            let host = document.getElementById(hostId);
            let root;

            for (let i = 0; i < layers; i++) {
                root = host.attachShadow({mode: 'open'});
                if (i < layers - 1) {
                    // Create a UNIQUE tag for this specific level
                    const nextTagName = levelTags[i] || "div";
                    const nextHost = document.createElement(nextTagName);
                    root.appendChild(nextHost);
                    host = nextHost;
                }
            }

            const style = document.createElement('style');
            style.textContent = getStyles(color);
            root.appendChild(style);

            const content = document.createElement('div');
            content.className = 'container';
            content.innerHTML = `<div class="label">${labelText}</div>`;

            if (type === 'div') {
                const d = document.createElement('div');
                d.className = 'target-btn';
                d.textContent = "Level " + layers + " Target";
                content.appendChild(d);
            } 
            else if (type === 'form') {
                const row = document.createElement('div');
                row.className = 'row';
                const input = document.createElement('input');
                input.placeholder = "Enter text...";
                const btn = document.createElement('div');
                btn.className = 'target-btn';
                btn.textContent = "Submit";
                const msg = document.createElement('div');
                msg.className = 'success-msg';

                btn.onclick = () => {
                    if(input.value) {
                        msg.textContent = `Captured: ${input.value}`;
                        msg.style.opacity = "1";
                        input.value = "";
                        setTimeout(() => msg.style.opacity = "0", 3000);
                    }
                };

                row.appendChild(input);
                row.appendChild(btn);
                content.appendChild(row);
                content.appendChild(msg);
            } 
            else if (type === 'iframe') {
                const ifr = document.createElement('iframe');
                ifr.srcdoc = `<body style="background:#0a0a0a;color:#555;display:flex;align-items:center;justify-content:center;height:60px;margin:0;font-family:sans-serif;font-size:12px;border:1px dashed #222;">IFRAME_LVL_${layers}</body>`;
                content.appendChild(ifr);
            }

            root.appendChild(content);
        }

        // Section 1
        buildUniqueShadow('s1-h1', 1, 'div', '#bb86fc', 'L1 Shadow');
        buildUniqueShadow('s1-h2', 2, 'div', '#a29bfe', 'L2 Shadow');
        buildUniqueShadow('s1-h3', 3, 'div', '#6c5ce7', 'L3 Shadow');
        buildUniqueShadow('s1-h4', 4, 'div', '#4834d4', 'L4 Shadow');

        // Section 2
        buildUniqueShadow('s2-h1', 1, 'form', '#03dac6', 'Form L1');
        buildUniqueShadow('s2-h2', 2, 'form', '#01a3a4', 'Form L2');
        buildUniqueShadow('s2-h3', 3, 'form', '#10ac84', 'Form L3');
        buildUniqueShadow('s2-h4', 4, 'form', '#00d2d3', 'Form L4');

        // Section 3
        buildUniqueShadow('s3-h1', 1, 'iframe', '', 'Frame L1');
        buildUniqueShadow('s3-h2', 2, 'iframe', '', 'Frame L2');
        buildUniqueShadow('s3-h3', 3, 'iframe', '', 'Frame L3');
        buildUniqueShadow('s3-h4', 4, 'iframe', '', 'Frame L4');

    </script>
</body>
</html>
